    <!-- ===== CART DRAWER ===== -->
    <div id="cart-overlay" onclick="closeCart()"></div>
    <div id="cart-drawer">
      <div class="cart-drawer-header">
        <h2 class="cart-drawer-title">CART</h2>
        <button class="cart-close-btn" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-drawer-items" id="cartItems">
        <div class="cart-empty" id="cartEmpty">
          <span class="cart-empty-icon">🛍</span>
          <p class="cart-empty-text">Your cart is empty</p>
          <a href="products.html" class="cart-empty-link" onclick="closeCart()">EXPLORE PRODUCTS →</a>
        </div>
        <div class="cart-item-row" id="cartItemsList"></div>
      </div>
      <div class="cart-drawer-footer">
        <div class="cart-summary-row">
          <span class="cart-summary-label">SUBTOTAL</span>
          <span class="cart-summary-value" id="drawerSubtotal">0 DA</span>
        </div>
        <div class="cart-summary-row">
          <span class="cart-summary-label">SHIPPING</span>
          <span class="cart-summary-value">Calculated at checkout</span>
        </div>
        <div class="cart-summary-divider"></div>
        <div class="cart-summary-row cart-total-row">
          <span class="cart-total-label">TOTAL</span>
          <span class="cart-total-value" id="drawerTotal">0 DA</span>
        </div>
        <a href="checkout.html" class="btn-drawer-checkout">PROCEED TO CHECKOUT →</a>
        <button class="btn-drawer-continue" onclick="closeCart()">← CONTINUE SHOPPING</button>
      </div>
    </div>

    <script>
        // Initialize i18n
        YUN_I18N.init();
        var langContainer = document.getElementById('langSwitcher');
        if (langContainer) { langContainer.innerHTML = YUN_I18N.createSwitcher(); }

        // === WISHLIST MODULE ===
        var WISHLIST_KEY='yun_wishlist';
        function getWishlist(){return JSON.parse(localStorage.getItem(WISHLIST_KEY)||'[]')}
        function saveWishlist(w){localStorage.setItem(WISHLIST_KEY,JSON.stringify(w))}
        function toggleWishlist(id){var w=getWishlist(),i=w.indexOf(id);if(i>-1)w.splice(i,1);else w.push(id);saveWishlist(w);return i===-1}
        function isInWishlist(id){return getWishlist().indexOf(id)>-1}

        // === CART DRAWER MODULE ===
        let cart = JSON.parse(localStorage.getItem('yun_cart') || '[]');
        function saveCart() { localStorage.setItem('yun_cart', JSON.stringify(cart)); updateCartUI(); }
        function openCart() { document.getElementById('cart-drawer').classList.add('active'); document.getElementById('cart-overlay').classList.add('active'); document.body.style.overflow = 'hidden'; renderCartItems(); }
        function closeCart() { document.getElementById('cart-drawer').classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); document.body.style.overflow = ''; }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeCart(); });
        function renderCartItems() {
          var list = document.getElementById('cartItemsList'), empty = document.getElementById('cartEmpty');
          if (!list) return;
          if (cart.length === 0) { list.innerHTML = ''; if (empty) empty.style.display = 'flex'; return; }
          if (empty) empty.style.display = 'none';
          list.innerHTML = cart.map(function(item, i) {
            return '<div class="drawer-cart-item">' +
              '<img src="' + item.image + '" alt="' + item.name + '">' +
              '<div class="drawer-item-info">' +
                '<div class="drawer-item-category">' + (item.category||'') + '</div>' +
                '<div class="drawer-item-name">' + item.name + '</div>' +
                '<div class="drawer-item-meta">' + (item.color ? 'Color: ' + item.color : '') + (item.size ? ' / Size: ' + item.size : '') + '</div>' +
                '<div class="drawer-item-qty">' +
                  '<button class="drawer-qty-btn" onclick="changeQty(' + i + ',-1)">−</button>' +
                  '<span class="drawer-qty-num">' + item.qty + '</span>' +
                  '<button class="drawer-qty-btn" onclick="changeQty(' + i + ',1)">+</button>' +
                '</div>' +
              '</div>' +
              '<div class="drawer-item-right">' +
                '<button class="drawer-remove-btn" onclick="removeItem(' + i + ')">✕</button>' +
                '<span class="drawer-item-price">' + (item.oldPrice && item.oldPrice > item.price ? '<span style="text-decoration:line-through;opacity:0.5;margin-right:6px;font-size:0.7rem">' + (item.oldPrice * item.qty).toLocaleString() + ' DA</span>' : '') + (item.price * item.qty).toLocaleString() + ' DA</span>' +
              '</div>' +
            '</div>';
          }).join('');
          updateCartUI();
        }
        function changeQty(index, delta) { cart[index].qty += delta; if (cart[index].qty <= 0) cart.splice(index, 1); saveCart(); renderCartItems(); }
        function removeItem(index) { cart.splice(index, 1); saveCart(); renderCartItems(); }
        function updateCartUI() {
          var total = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
          var count = cart.reduce(function(s, i) { return s + i.qty; }, 0);
          var subtotalEl = document.getElementById('drawerSubtotal'), totalEl = document.getElementById('drawerTotal');
          if (subtotalEl) subtotalEl.textContent = total.toLocaleString() + ' DA';
          if (totalEl) totalEl.textContent = total.toLocaleString() + ' DA';
          var badge = document.querySelector('.cart-count-badge');
          if (badge) { badge.textContent = count; badge.classList.toggle('visible', count > 0); }
          var bBadge = document.getElementById('bottomCartBadge');
          if (bBadge) { bBadge.textContent = count; bBadge.style.display = count > 0 ? 'flex' : 'none'; }
        }
        function addToCart(item) {
          var existing = cart.find(function(c) { return c.id === item.id && c.size === item.size && c.color === item.color; });
          if (existing) { existing.qty += (item.qty || 1); } else { var newItem = JSON.parse(JSON.stringify(item)); newItem.qty = item.qty || 1; cart.push(newItem); }
          saveCart(); openCart();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var hamburger = document.querySelector('.hamburger');
            var mobileMenu = document.getElementById('mobileMenu');
            var closeBtn = document.querySelector('.mobile-menu-close');
            var mobileLinks = mobileMenu.querySelectorAll('a');
            function openMenu() { mobileMenu.classList.add('open'); document.body.style.overflow = 'hidden'; }
            function closeMenu() { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; }
            hamburger.addEventListener('click', openMenu);
            closeBtn.addEventListener('click', closeMenu);
            mobileLinks.forEach(function(l) { l.addEventListener('click', closeMenu); });
            mobileMenu.addEventListener('click', function(e) { if (e.target === mobileMenu) closeMenu(); });

            var cartIcon = document.querySelector('.cart-icon');
            if (cartIcon) {
              cartIcon.style.position = 'relative';
              var badge = document.createElement('span');
              badge.className = 'cart-count-badge';
              badge.textContent = '0';
              cartIcon.appendChild(badge);
              cartIcon.addEventListener('click', function(e) { e.preventDefault(); openCart(); });
            }

            updateCartUI();

            var searchInput = document.getElementById('searchInput');
            var sortSelect = document.getElementById('sortSelect');
            var filterBtns = document.querySelectorAll('.filter-pill');
            var activeFilter = 'all';

            function filterAndSearch() {
                var query = searchInput.value.toLowerCase();
                document.querySelectorAll('.product-card').forEach(function(card) {
                    var name = card.querySelector('.product-name').textContent.toLowerCase();
                    var cat = card.getAttribute('data-category') || '';
                    var matchSearch = name.includes(query);
                    var matchFilter = activeFilter === 'all' || cat === activeFilter;
                    card.style.display = matchSearch && matchFilter ? 'block' : 'none';
                });
            }

            filterBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    activeFilter = btn.getAttribute('data-filter');
                    filterAndSearch();
                });
            });

            searchInput.addEventListener('input', filterAndSearch);

            sortSelect.addEventListener('change', function() {
                var grid = document.getElementById('productsGrid');
                var cards = Array.from(grid.querySelectorAll('.product-card'));
                var visibleCards = cards.filter(function(c) { return c.style.display !== 'none'; });
                var hiddenCards = cards.filter(function(c) { return c.style.display === 'none'; });
                visibleCards.sort(function(a, b) {
                    var priceA = parseInt(a.querySelector('.price-current').textContent.replace(/\D/g,''));
                    var priceB = parseInt(b.querySelector('.price-current').textContent.replace(/\D/g,''));
                    if (sortSelect.value === 'price-asc') return priceA - priceB;
                    if (sortSelect.value === 'price-desc') return priceB - priceA;
                    return 0;
                });
                visibleCards.forEach(function(c) { grid.appendChild(c); });
                hiddenCards.forEach(function(c) { grid.appendChild(c); });
            });

            // URL param filtering (after all vars defined)
            var urlParams = new URLSearchParams(window.location.search);
            var catParam = urlParams.get('category');
            if (catParam) {
              var match = document.querySelector('.filter-pill[data-filter="' + catParam + '"]');
              if (match) { filterBtns.forEach(function(b) { b.classList.remove('active'); }); match.classList.add('active'); activeFilter = catParam; filterAndSearch(); }
            }

            // Expose for dynamic product loading from Supabase
            window.__filterAndSearch = filterAndSearch;
            window.__initProductCards = function() {
                var quickViewBtns = document.querySelectorAll('.quick-view-btn');
                quickViewBtns.forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault(); e.stopPropagation();
                        var card = this.closest('.product-card');
                        if (card) window.location.href = card.getAttribute('href');
                    });
                });
            };
            window.__initProductCards();

        });


        (function() {
          var pt = document.getElementById('page-transition');
          if (!pt) return;
          if (sessionStorage.getItem('yun_visited')) {
            pt.style.transition = 'none';
            pt.style.transform = 'translateY(0%)';
            pt.style.display = 'flex';
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                pt.style.transition = 'transform 0.7s cubic-bezier(0.76, 0, 0.24, 1)';
                pt.style.transform = 'translateY(100%)';
                setTimeout(function() { pt.style.display = 'none'; }, 750);
              });
            });
          } else {
            pt.style.display = 'none';
          }
          document.addEventListener('click', function(e) {
            var link = e.target.closest('a[href]');
            if (!link) return;
            var href = link.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('tel') || link.target === '_blank') return;
            e.preventDefault();
            pt.style.display = 'flex';
            pt.style.transition = 'none';
            pt.style.transform = 'translateY(100%)';
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                pt.style.transition = 'transform 0.7s cubic-bezier(0.76, 0, 0.24, 1)';
                pt.style.transform = 'translateY(0%)';
                setTimeout(function() { window.location.href = href; }, 750);
              });
            });
          });
        })();
    </script>
</script>
<script>
YunCache.fetch('cats_active', 300000, function() {
    return yunDb.from('categories').select('name, slug').eq('is_active', true).order('name');
}).then(function(res) {
  var bar = document.getElementById('filterBar');
  if (!bar || !res.data || res.data.length === 0) return;
  res.data.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'filter-pill';
    btn.setAttribute('data-filter', c.slug);
    btn.textContent = c.name;
    bar.appendChild(btn);
  });
  bar.querySelectorAll('.filter-pill').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.filter-pill').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
    });
  });
}).catch(function() {});
</script>
<script>
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
document.addEventListener('DOMContentLoaded', async function() {
    // Load banner content from DB
    if (yunDb) {
        YunCache.fetch('products_page_settings', 300000, function() {
            return yunDb.from('site_settings').select('key, value').in('key', ['products_page_eyebrow', 'products_page_title']);
        }).then(function(res) {
            if (res.data) res.data.forEach(function(r) {
                if (r.key === 'products_page_eyebrow' && r.value) document.getElementById('ppEyebrow').textContent = r.value;
                if (r.key === 'products_page_title' && r.value) document.getElementById('ppTitle').textContent = r.value;
            });
        });
    }

    var grid = document.getElementById('productsGrid');
    if (!grid) return;
    if (!yunDb) { grid.innerHTML = '<div class="loading" style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.3);font-family:\'Space Mono\',monospace;font-size:0.7rem">Supabase not loaded. Please refresh.</div>'; return; }

    function renderProducts(products) {
        if (!products || products.length === 0) {
            grid.innerHTML = '<div class="loading" style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.3);font-family:\'Space Mono\',monospace;font-size:0.7rem">No products found.</div>';
            return;
        }
        function optImg(url, w) {
            if (!url || url.indexOf('cloudinary') === -1) return url;
            return url.replace('/image/upload/', '/image/upload/w_' + (w||400) + ',q_auto,f_auto/');
        }
        grid.innerHTML = products.map(function(p) {
            var catName = (p.category || '').toUpperCase().replace(/-/g, ' ');
            var img = p.primary_image || p.image_url || '';
            var priceHTML;
            var base = Number(p.base_price) || 0;
            var sale = p.sale_price != null ? Number(p.sale_price) : null;
            if (sale && sale < base) {
                priceHTML = '<span class="price-current">' + new Intl.NumberFormat('en-DZ').format(sale) + ' DA</span><span class="price-old">' + new Intl.NumberFormat('en-DZ').format(base) + ' DA</span>';
            } else {
                priceHTML = '<span class="price-current">' + new Intl.NumberFormat('en-DZ').format(base) + ' DA</span>';
            }
            return '<a href="product.html?slug=' + encodeURIComponent(p.slug) + '" class="product-card" data-category="' + escapeHtml(p.category || '') + '" data-product-id="' + escapeHtml(p.slug) + '">' +
                '<div class="product-img-wrap">' +
                    '<img src="' + escapeHtml(optImg(img, 400)) + '" alt="' + escapeHtml((p.name || '').toUpperCase()) + '" loading="lazy" decoding="async" width="400" height="533">' +
                    
                    '<div class="card-hover-overlay"><button class="quick-view-btn">QUICK VIEW</button></div>' +
                '</div>' +
                '<div class="product-info">' +
                    '<span class="product-category">' + escapeHtml(catName) + '</span>' +
                    '<h3 class="product-name">' + escapeHtml((p.name || '').toUpperCase()) + '</h3>' +
                    '<div class="product-price">' + priceHTML + '</div>' +
                '</div>' +
            '</a>';
        }).join('');
        if (window.__initProductCards) window.__initProductCards();
        if (window.__filterAndSearch) window.__filterAndSearch();
    }

    // METHOD 1: Try products_with_stock view (cached)
    try {
        var res = await YunCache.fetch('products_all', 60000, function() {
            return yunDb.from('products_with_stock').select('id, name, slug, category, base_price, sale_price, primary_image, total_stock').order('name');
        });
        if (res.error) throw res.error;
        if (res.data && res.data.length > 0) { renderProducts(res.data); return; }
    } catch(e) { console.log('View failed, trying raw tables:', e.message); }

    // METHOD 2: Fallback — query products + images (cached, specific columns)
    try {
        var res2 = await YunCache.fetch('products_all', 60000, function() {
            return yunDb.from('products').select('id, name, slug, category, base_price, sale_price, product_images(cloudinary_url, is_primary)').eq('is_active', true).order('name');
        });
        if (res2.error) throw res2.error;
        var products = (res2.data || []).map(function(p) {
            var imgs = p.product_images || [];
            var primary = imgs.find(function(i) { return i.is_primary; });
            return {
                id: p.id, name: p.name, slug: p.slug, category: p.category,
                base_price: p.base_price, sale_price: p.sale_price,
                primary_image: primary ? primary.cloudinary_url : (imgs[0] ? imgs[0].cloudinary_url : ''),
                total_stock: 999
            };
        });
        renderProducts(products);
    } catch(e2) {
        console.error('Raw query also failed:', e2);
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.3);font-family:\'Space Mono\',monospace;font-size:0.7rem">Failed to load products. Check console for errors.</div>';
    }
});
</script>
